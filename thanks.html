<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Thanks — MySelfKart</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/jpeg" href="favicon.jpeg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@600;700;800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #FCFCFE; color: #16172B; font-family: 'Hanken Grotesk', system-ui, sans-serif; -webkit-font-smoothing: antialiased; padding: 24px; }
    :root { --accent: #4F46E5; --accent-soft: #EEF1FF; --ink: #16172B; --muted: #5B5D72; --border: #E8E9F1; --good: #0BA37F; --good-soft: #E7F7F0; }
    a { color: var(--accent); text-decoration: none; }
    .card { max-width: 460px; width: 100%; text-align: center; background: #fff; border: 1px solid var(--border); border-radius: 20px; padding: 48px 36px; box-shadow: 0 24px 60px -32px rgba(22,23,43,.18); }
    .tick { width: 64px; height: 64px; border-radius: 50%; background: var(--good-soft); display: flex; align-items: center; justify-content: center; margin: 0 auto 22px; }
    h1 { font-family: 'Schibsted Grotesk', sans-serif; font-weight: 800; font-size: 28px; letter-spacing: -.02em; margin: 0; }
    p { font-size: 16px; line-height: 1.6; color: var(--muted); margin: 14px 0 0; }
    .btn { display: inline-block; margin-top: 28px; background: var(--accent); color: #fff; font-weight: 700; font-size: 15px; padding: 13px 26px; border-radius: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="tick">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#0BA37F" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
    </div>
    <h1>Got it — thank you!</h1>
    <p>Your store-plan enquiry is in. Sai or Swati will get back to you on WhatsApp within ~1 business day.</p>
    <a class="btn" href="index.html">Back to home</a>
  </div>
</body>
</html>
