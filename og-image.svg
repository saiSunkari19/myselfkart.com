    <text x="80" y="420" font-size="30" font-weight="500" fill="#5B5D72">Your own branded online store in India — live in 5 days.</text>
    <text x="80" y="465" font-size="30" font-weight="500" fill="#5B5D72">Razorpay, Shiprocket and your domain, all set up for you.</text>
