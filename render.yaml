services:
  - type: keyvalue
    name: selfkart-redis
    plan: starter
    region: singapore
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

  - type: web
    name: selfkart-medusa
    runtime: node
    plan: standard
    region: singapore
    rootDir: apps/medusa
    healthCheckPath: /health
    # Build needs devDependencies (typescript, knex) to compile the TS source and
    # load medusa-config.ts, but the service-level NODE_ENV=production makes pnpm
    # skip them -> "Cannot find module medusa-config". Override to development for
    # the build install+compile only.
    # Then copy the pnpm patches into the standalone .medusa/server output and
    # reinstall there with pnpm (--prod, runtime deps only) so the RLS tenant-context
    # patches actually apply at runtime. npm would ignore pnpm.patchedDependencies,
    # silently shipping unpatched Medusa.
    # Copy .npmrc (node-linker=hoisted) into .medusa/server so its prod install is
    # ALSO flat. Default pnpm linker installs @medusajs/core-flows under two peer
    # contexts (top-level + nested in @medusajs/medusa); both load at startup and
    # register core workflows twice -> "Workflow with id create-payment-sessions
    # already exists". Hoisted = one physical copy = one registration.
    # Finally remove the source node_modules: .medusa/server is nested under
    # apps/medusa, so at runtime Node resolution walks up and finds BOTH the
    # source deps and .medusa/server's. Deleting the parent leaves .medusa/server
    # self-contained (it has its own patched, hoisted deps).
    buildCommand: NODE_ENV=development corepack pnpm install --frozen-lockfile && NODE_ENV=development corepack pnpm run build && cp -r patches .medusa/server/ && cp .npmrc .medusa/server/ && cd .medusa/server && corepack pnpm install --prod && rm -rf ../../node_modules
    # Migrations and start must run from .medusa/server (compiled medusa-config.js
    # lives there; the source dir only has medusa-config.ts which prod can't load).
    preDeployCommand: cd .medusa/server && DATABASE_URL="$MIGRATOR_DATABASE_URL" corepack pnpm run db:migrate
    startCommand: cd .medusa/server && corepack pnpm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: COREPACK_ENABLE_DOWNLOAD_PROMPT
        value: "0"
      - key: PORT
        value: 9000
      - key: MEDUSA_WORKER_MODE
        value: shared
      - key: DISABLE_MEDUSA_ADMIN
        value: "false"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: selfkart-redis
          property: connectionString
      - key: DATABASE_URL
        sync: false
      - key: APP_DATABASE_URL
        sync: false
      - key: MIGRATOR_DATABASE_URL
        sync: false
      - key: MEDUSA_BACKEND_URL
        sync: false
      - key: STORE_CORS
        sync: false
      - key: ADMIN_CORS
        sync: false
      - key: AUTH_CORS
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: SELFKART_STOREFRONT_SECRET
        sync: false
      # Apex domain new seller subdomains hang off. Provisioning derives each
      # tenant host as `<subdomain>.<this>` (e.g. ticket.myselfkart.com). Unset,
      # it defaults to `localhost`, which stores `ticket.localhost` and breaks
      # both the admin store link and the storefront's host->tenant resolver.
      - key: SELFKART_STOREFRONT_BASE_DOMAIN
        value: myselfkart.com
      # Customer Google OAuth (optional — emailpass works without it). Set ALL
      # THREE in the Render dashboard, or leave all blank: a partial config makes
      # the server refuse to boot. GOOGLE_CALLBACK_URL is the single registered
      # redirect URI on the storefront broker host (must byte-match Google Console
      # AND the storefront's GOOGLE_CALLBACK_URL), e.g.
      # https://storefront.myselfkart.com/auth/google/callback
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      # SendGrid — only needed to actually deliver customer password-reset emails.
      # Without it the reset subscriber logs the reset URL instead. Set both keys
      # (and the dynamic-template id) together, or leave all blank.
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM
        sync: false
      - key: SENDGRID_PASSWORD_RESET_TEMPLATE
        sync: false
      - key: R2_FILE_URL
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_REGION
        value: auto
