services:
  - type: keyvalue
    name: selfkart-redis
    plan: starter
    region: singapore
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

  - type: web
    name: selfkart-medusa
    runtime: node
    plan: standard
    region: singapore
    rootDir: apps/medusa
    healthCheckPath: /health
    # Build needs devDependencies (typescript, knex) to compile the TS source and
    # load medusa-config.ts, but the service-level NODE_ENV=production makes pnpm
    # skip them -> "Cannot find module medusa-config". Override to development for
    # the build install+compile only.
    # Then copy the pnpm patches into the standalone .medusa/server output and
    # reinstall there with pnpm (--prod, runtime deps only) so the RLS tenant-context
    # patches actually apply at runtime. npm would ignore pnpm.patchedDependencies,
    # silently shipping unpatched Medusa.
    buildCommand: NODE_ENV=development corepack pnpm install --frozen-lockfile && NODE_ENV=development corepack pnpm run build && cp -r patches .medusa/server/ && cd .medusa/server && corepack pnpm install --prod
    # Migrations and start must run from .medusa/server (compiled medusa-config.js
    # lives there; the source dir only has medusa-config.ts which prod can't load).
    preDeployCommand: cd .medusa/server && DATABASE_URL="$MIGRATOR_DATABASE_URL" corepack pnpm run db:migrate
    startCommand: cd .medusa/server && corepack pnpm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: COREPACK_ENABLE_DOWNLOAD_PROMPT
        value: "0"
      - key: PORT
        value: 9000
      - key: MEDUSA_WORKER_MODE
        value: shared
      - key: DISABLE_MEDUSA_ADMIN
        value: "false"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: selfkart-redis
          property: connectionString
      - key: DATABASE_URL
        sync: false
      - key: APP_DATABASE_URL
        sync: false
      - key: MIGRATOR_DATABASE_URL
        sync: false
      - key: MEDUSA_BACKEND_URL
        sync: false
      - key: STORE_CORS
        sync: false
      - key: ADMIN_CORS
        sync: false
      - key: AUTH_CORS
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: SELFKART_STOREFRONT_SECRET
        sync: false
      - key: R2_FILE_URL
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_REGION
        value: auto
